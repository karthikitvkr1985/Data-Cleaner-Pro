kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "/home/runner/workspace/.venv/bin/uvicorn backend.main:app --host 0.0.0.0 --port 8080 --reload --app-dir /home/runner/workspace"

[services.production]

[services.production.build]
args = ["pip", "install", "-r", "backend/requirements.txt"]

[services.production.run]
args = ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8080"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
